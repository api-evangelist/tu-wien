      - type: Authentication
        url: https://researchdata.tuwien.ac.at/tuw/about/api
  - aid: tu-wien:researchdata-oai
    name: TU Wien Research Data OAI-PMH
    description: >-
      OAI-PMH metadata harvesting interface for the TU Wien Research Data
      repository (InvenioRDM), supporting standard verbs such as Identify,
      ListRecords and GetRecord for harvesting dataset metadata.
    humanURL: https://researchdata.tuwien.ac.at/tuw/about/api
    baseURL: https://researchdata.tuwien.ac.at/oai2d
    tags: [ OAI-PMH, Metadata, Harvesting, Research Data ]
    properties:
