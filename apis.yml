        url: https://researchdata.tuwien.ac.at/tuw/about/api
  - aid: tu-wien:repositum-oai
    name: reposiTUm OAI-PMH
    description: >-
      OAI-PMH metadata harvesting interface for reposiTUm, the open-access
      institutional repository of TU Wien, implemented on DSpace-CRIS by Campus
      IT. Exposes metadata for scientific documents, theses, reports and TU Wien
