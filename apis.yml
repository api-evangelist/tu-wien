---
aid: tu-wien
name: TU Wien
description: >-
  TU Wien (Vienna University of Technology, TU Wien) is Austria's largest
  science and technology university, founded in 1815, with more than 30,000
  students and eight faculties. It is ranked #190 in the QS World University
  Rankings 2025. Its public, documented developer footprint centers on research
  infrastructure: the TU Wien Research Data repository exposes a public REST API
  and an OAI-PMH interface built on InvenioRDM, and the reposiTUm open-access
  institutional repository (DSpace-CRIS) exposes OAI-PMH for metadata harvesting.
  Several departmental GitHub organizations publish open-source code, but there
  is no single unified, public developer portal for the university as a whole.
