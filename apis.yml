apis:
  - aid: tu-wien:researchdata-api
    name: TU Wien Research Data REST API
    description: >-
      Public REST API of the TU Wien Research Data repository, built on
      InvenioRDM. Provides programmatic access to records, metadata, search and
      file content. Read operations such as retrieving and searching records are
      public; write operations (creating drafts, uploading files, submitting
      curation requests) require a bearer access token generated from the user
      account.
    humanURL: https://researchdata.tuwien.ac.at/tuw/about/api
    baseURL: https://researchdata.tuwien.ac.at/api
    tags: [ Research Data, InvenioRDM, REST, FAIR, Repository ]
