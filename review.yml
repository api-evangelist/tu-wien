reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      Verified live, public, documented APIs centered on research
      infrastructure: the TU Wien Research Data repository exposes a public
      InvenioRDM REST API (records search/retrieve are public; writes need a
      bearer token) plus an OAI-PMH endpoint, and the reposiTUm DSpace-CRIS
      repository exposes OAI-PMH (the OpenAIRE variant responds 200; the bare
      /oai/request path returned 500 without a verb). TISS, the website and the
      LinkedIn school page resolve, but no single unified university developer
      portal was found; GitHub presence is fragmented across departmental orgs
      (e.g. tuwien-csd, TUWBIB). No endpoints were fabricated; every URL below
      was probed live.
    endpoints:
      - url: https://researchdata.tuwien.ac.at/api/records
        status: 200
        note: InvenioRDM public records REST endpoint, returns JSON.
      - url: https://researchdata.tuwien.ac.at/tuw/about/api
        status: 200
        note: Official Research Data API documentation page.
